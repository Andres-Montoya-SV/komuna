name: Lockfile review required

# Any PR that changes pnpm-lock.yaml must receive a maintainer review, then add the
# `lockfile-reviewed` label so this check turns green before merge.
on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]
    paths:
      - "pnpm-lock.yaml"

permissions:
  contents: read
  pull-requests: read

jobs:
  require-lockfile-reviewed-label:
    runs-on: ubuntu-latest
    steps:
      - name: Require "lockfile-reviewed" label
        uses: actions/github-script@v7
        with:
          script: |
            const labels = context.payload.pull_request.labels.map((l) => l.name);
            if (!labels.includes("lockfile-reviewed")) {
              core.setFailed(
                "This PR modifies pnpm-lock.yaml. After reviewing the diff, a maintainer must add the 'lockfile-reviewed' label.",
              );
            }
