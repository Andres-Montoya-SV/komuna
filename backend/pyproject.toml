[tool.black]
line-length = 88
target-version = ["py311", "py312", "py313"]
include = '\.pyi?$'

[tool.ruff]
target-version = "py311"
line-length = 88
src = ["app", "alembic"]
exclude = [".venv", "venv", ".lint-tools", ".pytest-venv"]

[tool.ruff.lint]
select = [
    "E4",
    "E7",
    "E9",
    "F",
    "I",
    "UP",
    "W",
]

[tool.ruff.lint.isort]
known-first-party = ["app"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["app/tests"]
pythonpath = ["."]
filterwarnings = [
    "ignore::DeprecationWarning",
]
